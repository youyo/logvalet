[env]
# Default values (override via .env or shell environment)
AWS_REGION = "ap-northeast-1"
LOGVALET_VERSION = "0.11.0"
LAMBDA_ARCH = "arm64"
# Load secrets from .env (ROLE_ARN, LOGVALET_BASE_URL, OIDC/OAuth/DynamoDB 等)
_.file = ".env"

[tasks.download]
description = "Download logvalet binary from GitHub Release"
run = """
ARCHIVE="logvalet_${LOGVALET_VERSION}_Linux_${LAMBDA_ARCH}.tar.gz"
curl -fsSL -o "${ARCHIVE}" "https://github.com/youyo/logvalet/releases/download/v${LOGVALET_VERSION}/${ARCHIVE}"
tar xzf "${ARCHIVE}" logvalet
rm -f "${ARCHIVE}"
"""

[tasks.package]
description = "Package logvalet + bootstrap into function.zip"
depends = ["download"]
run = """
chmod +x logvalet
zip -j function.zip bootstrap logvalet
"""

[tasks.deploy]
description = "Deploy logvalet to Lambda via lambroll (with Function URL)"
depends = ["package"]
run = "lambroll deploy --function function.json --function-url function_url.json"

[tasks.clean]
description = "Remove packaging artifacts"
run = "rm -f logvalet function.zip"

[tasks."dynamodb-create"]
description = "Create DynamoDB table for OAuth TokenStore (Mode B only)"
run = """
: "${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE:?set in .env}"
REGION="${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_REGION:-$AWS_REGION}"
aws dynamodb create-table \
  --table-name "${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE}" \
  --attribute-definitions AttributeName=pk,AttributeType=S \
  --key-schema AttributeName=pk,KeyType=HASH \
  --billing-mode PAY_PER_REQUEST \
  --region "${REGION}"
aws dynamodb wait table-exists \
  --table-name "${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE}" \
  --region "${REGION}"
echo "Table ${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE} created in ${REGION}."
"""

[tasks."dynamodb-delete"]
description = "Delete DynamoDB TokenStore table (destructive, Mode B only)"
run = """
: "${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE:?set in .env}"
REGION="${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_REGION:-$AWS_REGION}"
aws dynamodb delete-table \
  --table-name "${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE}" \
  --region "${REGION}"
echo "Table ${LOGVALET_MCP_TOKEN_STORE_DYNAMODB_TABLE} deletion requested in ${REGION}."
"""
